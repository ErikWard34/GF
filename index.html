<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rotating Heart Explosion</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #111;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  .container {
    position: relative;
    text-align: center;
  }

  /* HEART */
  .heart {
    width: 100px;
    height: 100px;
    background: red;
    position: relative;
    transform: rotate(-45deg);
    animation: spin 4s linear infinite;
    cursor: pointer;
    transition: transform 0.3s ease;
  }

  .heart::before,
  .heart::after {
    content: "";
    width: 100px;
    height: 100px;
    background: red;
    border-radius: 50%;
    position: absolute;
  }

  .heart::before {
    top: -50px;
    left: 0;
  }

  .heart::after {
    left: 50px;
    top: 0;
  }

  /* ROTATION */
  @keyframes spin {
    0% { transform: rotate(-45deg) rotate(0deg); }
    100% { transform: rotate(-45deg) rotate(360deg); }
  }

  /* TEXT */
  .text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    color: white;
    font-size: 20px;
    opacity: 0;
    transition: all 0.4s ease;
    pointer-events: none;
  }

  /* PARTICLES */
  .particle {
    position: absolute;
    width: 8px;
    height: 8px;
    background: pink;
    border-radius: 50%;
    opacity: 0;
  }

  /* HOVER EFFECT */
  .container:hover .heart {
    transform: rotate(-45deg) scale(1.3);
    animation-play-state: paused;
  }

  .container:hover .text {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }

  .container:hover .particle {
    animation: explode 0.8s forwards;
  }

  /* PARTICLE ANIMATION */
  @keyframes explode {
    0% {
      transform: translate(0, 0);
      opacity: 1;
    }
    100% {
      transform: translate(var(--x), var(--y));
      opacity: 0;
    }
  }
</style>
</head>
<body>

<div class="container">
  <div class="heart"></div>
  <div class="text">Boom 💥 Love!</div>

  <!-- PARTICLES -->
  <div class="particle" style="--x: -120px; --y: -80px;"></div>
  <div class="particle" style="--x: 120px; --y: -80px;"></div>
  <div class="particle" style="--x: -100px; --y: 100px;"></div>
  <div class="particle" style="--x: 100px; --y: 100px;"></div>
  <div class="particle" style="--x: 0px; --y: -140px;"></div>
  <div class="particle" style="--x: 0px; --y: 140px;"></div>
</div>

</body>
</html>
